<!doctype html>
<html>
  <head>
    <title>Behavior Typing Test</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Typing Behaviour Collection</h1>
      <p class="instructions">
        Type the paragraph below normally. Do not rush or slow down
        intentionally. Do not copy-paste.
      </p>

      <!-- Participant Info — filled once, persists across sessions -->
      <div class="form-row" id="participantForm">
        <div class="form-group">
          <label for="userID">User ID <span class="required">*</span></label>
          <input type="text" id="userID" placeholder="e.g. user001" />
        </div>
        <div class="form-group">
          <label for="age">Age</label>
          <input
            type="number"
            id="age"
            placeholder="e.g. 21"
            min="10"
            max="80"
          />
        </div>
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender">
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
            <option value="prefer_not">Prefer not to say</option>
          </select>
        </div>
        <div class="form-group">
          <label for="keyboard">Keyboard</label>
          <select id="keyboard">
            <option value="">Select</option>
            <option value="laptop">Laptop</option>
            <option value="external">External</option>
            <option value="mechanical">Mechanical</option>
            <option value="membrane">Membrane</option>
          </select>
        </div>
        <div class="form-group">
          <label for="typingExp">Typing Experience</label>
          <select id="typingExp">
            <option value="">Select</option>
            <option value="beginner">Beginner</option>
            <option value="normal">Normal</option>
            <option value="fast">Fast</option>
          </select>
        </div>
      </div>

      <hr />

      <!-- Session counter -->
      <div class="session-info">
        Session: <span id="sessionCounter">1</span>
        <button id="refreshPara" title="Get a new paragraph">
          &#8635; New Paragraph
        </button>
      </div>

      <p class="prompt-label">Type the paragraph below:</p>

      <!-- Monkeytype display -->
      <div id="typingDisplay"></div>

      <p id="statusMessage"></p>

      <!-- Hidden textarea -->
      <textarea
        id="typingArea"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      ></textarea>

      <br /><br />
      <button id="downloadData">Download Session Data</button>
    </div>
    <script src="capture.js"></script>
  </body>
</html>
