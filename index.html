<!doctype html>
<html>
  <head>
    <title>Behavior Typing Test</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Typing Behaviour Collection</h1>
      <p class="instructions">
        Please type the paragraph below <strong>normally</strong>. Do not type
        faster or slower than usual. Do not copy-paste. Stay on this page until
        done.
      </p>

      <!-- Participant Info -->
      <div class="form-row">
        <div class="form-group">
          <label for="userID">User ID <span class="required">*</span></label>
          <input type="text" id="userID" placeholder="e.g. user001" required />
        </div>
        <div class="form-group">
          <label for="age">Age</label>
          <input
            type="number"
            id="age"
            placeholder="e.g. 21"
            min="10"
            max="80"
          />
        </div>
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender">
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
            <option value="prefer_not">Prefer not to say</option>
          </select>
        </div>
        <div class="form-group">
          <label for="keyboard">Keyboard Type</label>
          <select id="keyboard">
            <option value="">Select</option>
            <option value="laptop">Laptop</option>
            <option value="external">External</option>
            <option value="mechanical">Mechanical</option>
            <option value="membrane">Membrane</option>
          </select>
        </div>
        <div class="form-group">
          <label for="typingExp">Typing Experience</label>
          <select id="typingExp">
            <option value="">Select</option>
            <option value="beginner">Beginner (hunt and peck)</option>
            <option value="normal">Normal (some touch typing)</option>
            <option value="fast">Fast (full touch typing)</option>
          </select>
        </div>
      </div>

      <hr />

      <!-- Prompt -->
      <p class="prompt-label">Type the paragraph below:</p>
      <div id="textPrompt"></div>
      <p id="statusMessage"></p>

      <!-- Typing Area -->
      <textarea
        id="typingArea"
        placeholder="Start typing here..."
        rows="8"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      </textarea>

      <br /><br />
      <button id="downloadData">Download Session Data</button>
    </div>

    <script src="capture.js"></script>
  </body>
</html>
